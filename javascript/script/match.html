<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta lang="en-US">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>
		Docu
	</title>
</head>
<body>
	<form>
		Email Id<br>
		<input type="password" name="password" id="pass">
		<input type="submit" onclick="return stp()">
	</form>
	<p id="msg"></p>
	<script type="text/javascript">
		function stp() 
		{
			var capital = /[A-Z]/g;
			var lower = /[a-z]/g;
			var number = /[0-9]/g;
			var user_input = document.getElementById("pass").value;
			var result = user_input.match(capital)&&user_input.match(lower)&&user_input.match(number)? "Password accepted":"Password not accepted";
			document.getElementById("msg").innerHTML=result;
			return false;
		}
	</script>
</body>
</html>
