<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta lang="en-US">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>
		Form
	</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" />
	<style type="text/css">
		.col-1{
			width: 8.33%;
		}
		.col-2{
			width: 16.66%;
		}
		.col-3{
			width: 25%;
		}
		.col-4{
			width: 33.32%;
		}
		.col-5{
			width: 41.66%;
		}
		.col-6{
			width: 50%;
		}
		.col-7{
			width: 58.33%;
		}
		.col-8{
			width: 66.66%;
		}
		.col-9{
			width: 75%;
		}
		.col-10{
			width: 83.33%;
		}
		.col-11{
			width: 91.66%;
		}
		.col-12{
			width: 100%;
		}

		body{
			background-color: pink;
		}
		#dv{
			width: 700px;
			height: 500px;
			border: 2px solid blue; 
			margin: 30px auto;
			background-image: url(hlo.jpg); 
		}
		#word{
			margin: 50px auto;
			font-size: 30px;
			margin-left: 280px;
		}
		#btn{
			font-size: 30px; 
			margin-left: 280px;
		}
		#box{
			height: 300px;
			width: 450px;
			border: 2px solid blue; 
			margin: 30px auto;
			background-image: none; 
			display: none;
		}
		h1{
			font-size: 40px;
			text-align: center;
			font-style: sans-serif; 
		}

		@media only screen and (max-width: 600px)
		{
			#dv{
				height: 450px;
				width: 450px;
				margin: 30px auto; 
			}
			#box{
				height: 300px;
				width: 400px;
				margin: 30px auto; 
				background-image: none;
				display: none;
			}
			.col-4{
				width: 100%;
			}
			#word{
				margin-left: 110px;
				font-size: 20px;
			}
			#btn{
			font-size: 30px; 
			margin-left: 100px;
			}
		}
	</style>
	<script type="text/javascript">
		function check()
		{
			var a = document.getElementById("msg");
			a.style.display = "none";
			var b = document.getElementById("loader");
			b.style.opacity = 1;
			var c = document.getElementById("pass").value;
			var len = c.length;
			var check= document.getElementById("check")
			len>10 ? check.style.opacity = 1 : b.style.opacity = 1;
			len>10 ? b.style.opacity = 0 : check.style.opacity = 0;
		}

		function result()
		{
			var x = document.getElementById("pass").value;
			var y = document.getElementById("email").value;
			var z = document.getElementById("pswd").value;
			var q = document.getElementById("phone").value;
			var p = document.getElementById("btn");
			var r = document.getElementById("box");
			var n = document.getElementById("dv");
			n.style.display = "none";
			r.innerHTML = "Your All Details : " + x + y + z + q;
			r.style.display = "block";
			r.style.fontSize = "30px";

		}
	</script>
</head>
<body>
	<div id="dv">
		<form id="word">
		Name :
		<input type="text" name="password" id="pass" oninput="check()"><span id="msg"></span><i id="loader" class="fas fa-spinner fa-spin " style="opacity: 0;"></i><i id="check" class="fas fa-check" style="opacity: 0"></i>
	</form>

	<form id="word">
		Email Id : 
		<input type="text" name="text" id="email">
		<input type="submit" onclick="return stp()">
	</form>
	<p></p>

	<form id="word">
		Password : 
		<input type="password" name="password" id="pswd">
		<input type="submit" onclick="return phone()">
	</form>
	<p id="msg"></p>

	<form id="word">
		Phone No : 
		<input type="text" name="text" id="phone">
	</form>

	<button id="btn" onclick="result()">Submit All The Details</button>
	</div>
	<div id="box">
		<h1>Your All Details</h1>
	</div>
</body>
</html>
