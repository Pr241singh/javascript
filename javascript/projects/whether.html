<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta lang="en-US">
	<meta meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather App - Easy Tutorials</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
	<style type="text/css">
		*{
			margin: 0;
			padding: 0;
			font-family: sans-serif;
			box-sizing: border-box;
		}
		body{
			background-color: #222;
		}
		.card{
			width: 90%;
			max-width: 470px;
			background: linear-gradient(135deg, #00feba, #5b548a);
			color: #fff;
			margin: 100px auto 0;
			border-radius: 20px;
			padding: 40px 35px; 
		}

		.search{
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}
		.search input{
			border:0;
			outline: 0;
			background: #ebfffc;
			color: #555;
			padding: 10px 25px;
			height: 60px;
			border-radius: 30px;
			flex: 1;
			margin-right: 16px;
			font-size: 18px;
		}
		.search button{
			border:0;
			outline: 0;
			background: #ebfffc;
			border-radius: 50%;
			width: 60px;
			height: 60px;
			cursor: pointer;
		}
		.search button i{
			width: 16px;
		}
		.weather_icon{
			width: 170px;
			margin-top: 30px;
		}
		.weather h1{
			font-size: 80px;
			font-weight: 500;
		}
		.weather h2{
			font-size: 18px;
			font-weight: 500;
			margin-top: -10px;
		}
		.details{
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 20px;
			margin-top: 50px;
		}
		.col{
			display: flex;
			align-items: center;
			text-align: left;
		}
		.col i{
			width: 40px;
			margin-right: 10px;
		}
		.humidity{
			font-size: 28px;
			margin-top: -6px;
		}

		.wind{
			font-size: 28px;
			margin-top: -6px;
		}



	</style>
</head>
<body>

<div class="card">
	<div class="search">
		<input type="text" placeholder="Enter City Name" spellcheck="false">
		<button><i class="fa-solid fa-magnifying-glass"></i></button>
	</div>
	<div class="weather">
		<i class="fa-solid fa-cloud-rain weather_icon"></i>
		<h1 class="temp">22°c</h1>
		<h2 class="city">New York</h2>
		<div class="details">
			<div class="col">
				<i class="fa-solid fa-cloud-sun"></i>
				<div>
					<p class="humidity">50%</p>
					<p>Humidity</p>
				</div>
			</div>

			<div class="col">
				<i class="fa-solid fa-cloud-sun"></i>
				<div>
					<p class="wind">15 Km/h</p>
					<p>Wind Speed</p>
				</div>
			</div>
		</div>
	</div>
</div>

<script type="text/javascript">
	//https://api.openweathermap.org/data/2.5/weather?&=&units=metric&q=bangalore//
	
	const apiKey = "b903af866fb55907d6f87f57fe201ee7";
	const apiUrl = "https://api.openweathermap.org/data/2.5/weather?&units=metric&q=";
	const searchBox = document.querySelector('.search input');
	const searchBtn = document.querySelector('.search button');
	const weather_icon = document.querySelector('.weather_icon');
	
	async function checkWeather(city){
		const response = await fetch(apiUrl + city + '&appid=${apiKey}');
		var data = await response.json();

		console.log(data);

		document.querySelector('.city').innerHTML = data.name;
		document.querySelector('.temp').innerHTML = Math.round(data.main.temp) + "°c";
		document.querySelector('.humidity').innerHTML = data.main.humidity + "%";
		document.querySelector('.wind').innerHTML = data.main.wind + " km/h";

		if (data.weather[0].main == "Cloud")
		{
			weather_icon.src = "images/clouds.png";
		}
		else if(data.weather[0].main == "Clear"){
			weather_icon.src = "images/clear.png";
		}
		else if(data.weather[0].main == "Rain"){
			weather_icon.src = "images/rain.png";
		}
		else if(data.weather[0].main == "Drizzle"){
			weather_icon.src = "images/drizzle.png";
		}
		else if(data.weather[0].main == "Mist"){
			weather_icon.src = "images/mist.png";
		}
	}
	searchBtn.addEventListener("click", ()=>{
		checkWeather(searchBox.value);
	})

</script>
</body>
</html>
