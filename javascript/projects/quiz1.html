<!DOCTYPE html>
<html>
<head>
	<title>Quiz app</title>
</head>
<style type="text/css">
	*{
		padding: 0;
		margin: 0;
		box-sizing: border-box;
	}

	body{
		background-color: #ae24ca;
		height: 100vh;
		display: flex;
		justify-content: center;
		align-items: center;
	}

	.quiz-container{
		border-radius: 10px;
		box-shadow: 0 0 10px black;
		width: 300px;
		height: 380px;
		background-color: white;
		position: relative;
	}

	#quiz-question{
		font-size: 2rem;
		padding: 20px;
		text-align: center;
	}

	ul{
		list-style: none;
		margin-left: 30px;
	}

	li{
		font-size: 1.2rem;
		margin-bottom: 15px;
		padding: 5px;
	}

	#submit{
		background: #db3b8d;
		border: none;
		color: #fff;
		font-size: 1.2rem;
		display: flex;
		width: 100%; 
		position: absolute;
		bottom: 0;
		left: 0;
		padding: 7.6px;
		border-radius: 4px;
	}
</style>
<body>
<div class="quiz-container">
	<h2 id="quiz-question">
		Question tag
	</h2>

	<ul>
		<li>
			<input type="radio" class="answer" id="option-a" name="quiz-options">
			<label for="option-a" id="text-option-a">Option A</label>
		</li>

		<li>
			<input type="radio" class="answer" id="option-b" name="quiz-options">
			<label for="option-b" id="text-option-b">Option B</label>
		</li>

		<li>
			<input type="radio" class="answer" id="option-c" name="quiz-options">
			<label for="option-c" id="text-option-c">Option C</label>
		</li>

		<li>
			<input type="radio" class="answer" id="option-d" name="quiz-options">
			<label for="option-d" id="text-option-d">Option D</label>
		</li>
	</ul>

	<button id="submit">Submit</button>
</div>

<script type="text/javascript">
	
	const quiz = [
		{
			question: "Which is the largest animal in the wrold",
				ans1text: "Shark", correct: false,
				ans2text: "Blue Whale", correct: true,
				ans3text: "Elephant", correct: false,
				ans4text: "Giraffe", correct: false,
		},
		{
			question: "Which is the smallest country in the wrold",
				ans1text: "Vatican City", correct: false,
				ans2text: "Bhutan", correct: false,
				ans3text: "Nepal", correct: false,
				ans4text: "Shree Lanka", correct: true,
		},
		{
			question: "Which is the largest dessert in the wrold",
					ans1text: "Kalhara", correct: false,
					ans2text: "Gobi", correct: false,
					ans3text: "Sahara", correct: false,
					ans4text: "Antrctica", correct: true,
		},
		{
			question: "Which is the smallest continent in the wrold",
				ans1text: "Asia", correct: false,
				ans2text: "Australia", correct: true,
				ans3text: "Arctic", correct: false,
				ans4text: "Africa", correct: false,
		}
	];

	const question = document.getElementById('quiz-question');
	console.log(question);
	console.log(question.textContent);
	const option_a = document.getElementById('text-option-a');
	const option_b = document.getElementById('text-option-b');
	const option_c = document.getElementById('text-option-c');
	const option_d = document.getElementById('text-option-d');
	const submit = document.getElementById('submit');
	const answerElement = document.querySelectorAll('.answer');
	console.log(option_a);
	console.log(option_b);
	console.log(option_c);
	console.log(option_d);
	console.log(option_a.textContent);
	console.log(option_b.textContent);
	console.log(option_c.textContent);
	console.log(option_d.textContent);

	let currentQuestion = 0;
	let score = 0;
	console.log(quiz[currentQuestion].question);
	console.log(quiz[currentQuestion].ans1text);
	console.log(quiz[currentQuestion].ans2text);
	console.log(quiz[currentQuestion].ans3text);
	console.log(quiz[currentQuestion].ans4text);

	question.textContent = quiz[currentQuestion].question;
	option_a.textContent = quiz[currentQuestion].ans1text;
	option_b.textContent = quiz[currentQuestion].ans2text;
	option_c.textContent = quiz[currentQuestion].ans3text;
	option_d.textContent = quiz[currentQuestion].ans4text;

	console.log("answer element", answerElement);

	submit.addEventListener("click",() => {
			const checkedAns = document.querySelector('input[type="radio"]:checked');
			console.log(checkedAns);
			//console.log(checkedAns.nextElementSibling.textContent);

			if(checkedAns === null){
				alert("Please select an answer");
			}
			else{
				if(checkedAns.nextElementSibling.textContent === quiz[currentQuestion]){
					score++;
				}

				checkedAns.checked = false;
				currentQuestion++;
				if (currentQuestion < quiz.length) {
					question.textContent = quiz[currentQuestion].question;
						option_a.textContent = quiz[currentQuestion].ans1text;
						option_b.textContent = quiz[currentQuestion].ans2text;
						option_c.textContent = quiz[currentQuestion].ans3text;
						option_d.textContent = quiz[currentQuestion].ans4text;
						checkedAns.checked = false;
				}
				else{
					alert("Your score is " + score);
					location.reload();
				}
			}
	});
</script>
</body>
</html>
