<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta lang="en-US">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>
		Document
	</title>
	<script type="text/javascript">
		function add() 
		{
			var a = eval(document.m1.t1.value);
			var b = eval(document.m1.t2.value);
			var c = a+b;
			document.m1.t3.value=c;
		}
		function sub() 
		{
			var a = eval(document.m1.t1.value);
			var b = eval(document.m1.t2.value);
			var c = a-b;
			document.m1.t3.value=c;
		}
		function mul() 
		{
			var a = eval(document.m1.t1.value);
			var b = eval(document.m1.t2.value);
			var c = a*b;
			document.m1.t3.value=c;
		}
		function div() 
		{
			var a = eval(document.m1.t1.value);
			var b = eval(document.m1.t2.value);
			var c = a/b;
			document.m1.t3.value=c;
		}
		function mod() 
		{
			var a = eval(document.m1.t1.value);
			var b = eval(document.m1.t2.value);
			var c = a%b;
			document.m1.t3.value=c;
		}
		function exp() 
		{
			var a = eval(document.m1.t1.value);
			var b = eval(document.m1.t2.value);
			var c = a**b;
			document.m1.t3.value=c;
		}
	</script>
	<style type="text/css">
		#cal{
			text-align: center;
			font-weight: bold;
			font-family: sans-serif;
			font-size: 40px;  
		}
		#first{
			width: 900px;
			height: 150px;
			border: 2px solid black;
			background-color: #F71B86;
			margin: 30px auto;
		}
		section{
			width: 900px;
			height: 40px;
			border: 2px solid black;
			margin: 30px auto;
		}
		#int{
			font-size: 30px;
			align-items: center;
			display: inline-flex;
		}
		#int[type=button]:hover{
			background-color: blue;
			color: white;
		}
		.col-1{
			width: 8.33%;
		}
		.col-2{
			width: 16.66%;
		}
		.col-3{
			width: 25%;
		}
		.col-4{
			width: 33.32%;
		}
		.col-5{
			width: 41.66%;
		}
		.col-6{
			width: 50%;
		}
		.col-7{
			width: 58.33%;
		}
		.col-8{
			width: 66.66%;
		}
		.col-9{
			width: 75%;
		}
		.col-10{
			width: 83.33%;
		}
		.col-11{
			width: 91.66%;
		}
		.col-12{
			width: 100%;
		}
		@media only screen and (max-width: 600px)
		{
			#first{
				height: 210px;
				width: 450px;
				text-align: center; 
			}
			.col-4{
				width: 100%;
			}
			form{
				width: 150px;
				text-align: center; 
			}
			section{
				height: 210px;
				width: 450px;
			}
			
			#int{
				width: 450px;
				height: 35px;
				font-size: 20px;
			}
		}

	</style>
</head>
<body>
	<h1 id="cal">Calculator System</h1>	
	<hr>
	<header id="first" class="col-4">
			<form method="POST" name="m1" class="m1" class="col-4">
			<br>
			<h2 align="center">Calculator</h2>
			First Number : &nbsp&nbsp&nbsp&nbsp
			<input type="text" name="t1"/>
			Second Number:&nbsp&nbsp&nbsp&nbsp
			<input type="text" name="t2"/>
			Result: &nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp
			<input type="text" name="t3"/>
			</form>
	</header> 
		<section>
		<input id="int" type="button" name="t4" value="Addition" onclick="add()"/>
		<input id="int" type="button" name="t5" value="Substraction" onclick="sub()"/>
		<input id="int" type="button" name="t6" value="Multiplication" onclick="mul()"/>
		<input id="int" type="button" name="t7" value="Division" onclick="div()"/>
		<input id="int" type="button" name="t8" value="modulus" onclick="mod()"  />
		<input id="int" type="button" name="t9" value="power" onclick="exp()"  />
	</section>
	</form>
</body>
</html>
