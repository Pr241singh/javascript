	var b = document.getElementById("txt");

		{
			var y = document.getElementById("int").value.replace(/.*(\/|\\)/, '');
			window.alert(y);
		}

		function image()
		{
			var p = document.getElementById("ppt").value.replace(/.*(\/|\\)/, '');
